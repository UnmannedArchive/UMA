<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moodwave — Playlist Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Ambient background blobs -->
    <div class="ambient">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
    </div>

    <!-- Header -->
    <header class="header">
      <div class="logo" onclick="showMoodSelect()">
        <span class="logo-icon">~</span> Moodwave
      </div>
    </header>

    <!-- Step 1: Mood Selection -->
    <main id="mood-select" class="view active">
      <div class="view-content">
        <h1 class="main-title">How are you <span class="highlight">feeling</span>?</h1>
        <p class="main-subtitle">Pick your current vibe and we'll craft the perfect playlist.</p>

        <div class="mood-grid">
          <button class="mood-card" data-mood="happy" onclick="selectMood(this)">
            <div class="mood-emoji">&#9728;&#65039;</div>
            <h3>Happy</h3>
            <p>Upbeat & joyful</p>
          </button>
          <button class="mood-card" data-mood="sad" onclick="selectMood(this)">
            <div class="mood-emoji">&#127783;&#65039;</div>
            <h3>Sad</h3>
            <p>Melancholy & reflective</p>
          </button>
          <button class="mood-card" data-mood="chill" onclick="selectMood(this)">
            <div class="mood-emoji">&#127754;</div>
            <h3>Chill</h3>
            <p>Relaxed & easy</p>
          </button>
          <button class="mood-card" data-mood="energetic" onclick="selectMood(this)">
            <div class="mood-emoji">&#9889;</div>
            <h3>Energetic</h3>
            <p>Pumped & fired up</p>
          </button>
          <button class="mood-card" data-mood="romantic" onclick="selectMood(this)">
            <div class="mood-emoji">&#127801;</div>
            <h3>Romantic</h3>
            <p>Warm & intimate</p>
          </button>
          <button class="mood-card" data-mood="angry" onclick="selectMood(this)">
            <div class="mood-emoji">&#128293;</div>
            <h3>Angry</h3>
            <p>Intense & raw</p>
          </button>
          <button class="mood-card" data-mood="focused" onclick="selectMood(this)">
            <div class="mood-emoji">&#127911;</div>
            <h3>Focused</h3>
            <p>Deep work mode</p>
          </button>
          <button class="mood-card" data-mood="nostalgic" onclick="selectMood(this)">
            <div class="mood-emoji">&#128247;</div>
            <h3>Nostalgic</h3>
            <p>Memory lane vibes</p>
          </button>
        </div>
      </div>
    </main>

    <!-- Step 2: Intensity Slider -->
    <main id="intensity-select" class="view">
      <div class="view-content intensity-content">
        <h2 class="step-title">How <span id="mood-label" class="highlight">happy</span> are you?</h2>
        <p class="step-subtitle">Drag to set the intensity. We'll tune the playlist to match.</p>

        <div class="intensity-slider-wrap">
          <span class="intensity-label-lo">A little</span>
          <div class="slider-container">
            <input type="range" id="intensity" min="1" max="5" value="3" class="intensity-slider">
            <div class="slider-track" id="slider-track"></div>
            <div class="slider-ticks">
              <span></span><span></span><span></span><span></span><span></span>
            </div>
          </div>
          <span class="intensity-label-hi">Extremely</span>
        </div>

        <button class="generate-btn" onclick="generatePlaylist()">
          <span class="btn-text">Generate My Playlist</span>
          <span class="btn-arrow">&rarr;</span>
        </button>
      </div>
    </main>

    <!-- Step 3: Loading -->
    <main id="loading-view" class="view">
      <div class="view-content loading-content">
        <div class="loader">
          <div class="loader-bars">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
        </div>
        <p class="loading-text">Tuning into your wavelength...</p>
      </div>
    </main>

    <!-- Step 4: Playlist Result -->
    <main id="playlist-view" class="view">
      <div class="view-content playlist-content">
        <div class="playlist-header">
          <div class="playlist-cover" id="playlist-cover"></div>
          <div class="playlist-info">
            <span class="playlist-tag" id="playlist-tag">Happy Vibes</span>
            <h2 class="playlist-name" id="playlist-name">Your Playlist</h2>
            <p class="playlist-meta" id="playlist-meta">12 tracks &middot; ~45 min</p>
          </div>
        </div>

        <div class="track-list" id="track-list">
          <!-- Tracks injected by JS -->
        </div>

        <div class="playlist-actions">
          <button class="action-btn secondary" onclick="shufflePlaylist()">Shuffle</button>
          <button class="action-btn primary" onclick="showMoodSelect()">New Mood</button>
        </div>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
